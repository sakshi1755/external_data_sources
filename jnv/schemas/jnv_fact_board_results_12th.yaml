# Auto-generated by clean_board_results_12th.py — do not edit by hand.

description: >
  CBSE 12th board exam results for JNV students, 2022–2025.
  One row per student per subject (long format).
  Includes both main subjects (up to 6, with full marks) and internal
  assessment subjects (up to 3, grade only — Work Experience, Health &
  Physical Education, General Studies). Use is_internal to distinguish.
  Source files: raw/board_results_12th/JNV12{YY}.xlsx.

grain: (exam_year, roll_number, subject_code)

source_files:
  2022: JNV1222.xlsx  # sheet: jnv1222
  2023: JNV1223.xlsx  # sheet: jnv1223
  2024: JNV1224.xlsx  # sheet: jnv1224
  2025: JNV1225.xlsx  # sheet: Main Data

notes:
  - region is null for 2024 — source file had no region column.
  - Academic stream (Science/Commerce/Arts) is not present in any source file.
    The 'stream' column in 2022 contained region names and was remapped to region.
  - roll_number_10th is only populated for 2025 and can be used to join to
    jnv_fact_board_results_10th on (exam_year - 2, roll_number_10th).

columns:
  - name: exam_year
    type: str
    description: Academic exam year (e.g. 2022). Derived from source filename.

  - name: session
    type: str
    description: Academic session string from source (e.g. "2021-2022").

  - name: roll_number
    type: str
    description: Student's 12th board exam roll number. Part of the grain.

  - name: school_code
    type: str
    description: JNV school code.

  - name: school_name
    type: str
    description: Full JNV school name (abbr_name in source).

  - name: centre_code
    type: str
    description: Exam centre code.

  - name: student_name
    type: str
    description: Student full name.

  - name: mother_name
    type: str
    description: Mother's name.

  - name: father_name
    type: str
    description: Father's name.

  - name: date_of_birth
    type: str
    description: Date of birth (raw string as received, format varies by year).

  - name: gender
    type: str
    description: "Normalised gender: Male or Female."

  - name: category
    type: str
    description: "Caste/social category: SC, ST, OBC, or Gen."

  - name: disability
    type: str
    description: Disability/handicap flag from source (hand column). Usually null.

  - name: region
    type: str
    description: >
      JNV administrative region (e.g. BHOPAL, LUCKNOW, HYDERABAD).
      Null for 2024 — source file had no region column.
      In 2022, derived from the 'stream' column which contained region names.

  - name: state
    type: str
    description: Two-letter state code (e.g. KK, KL, OR).

  - name: district
    type: str
    description: District name. Only populated for 2023 (DISTT column in source).

  - name: school_type
    type: str
    description: School type code (schtype). Typically "J" for JNV.

  - name: exam_month
    type: str
    description: Month in which the exam was held (e.g. MAY, JULY).

  - name: date_of_declaration
    type: str
    description: Date results were declared (raw string).

  - name: date_revised
    type: str
    description: Date results were revised, if applicable (usually null).

  - name: is_internal
    type: bool
    description: >
      True for internal assessment subjects (Work Experience, Health &
      Physical Education, General Studies — subject codes 500, 502, 503).
      These rows have null theory_marks, practical_marks, and final_marks.
      False for main academic subjects.

  - name: subject_code
    type: str
    description: CBSE subject code (e.g. 301 = English Core, 41 = Mathematics, 42 = Physics).

  - name: subject_name
    type: str
    description: Subject name as given in the board data.

  - name: theory_marks
    type: str
    description: Theory/written marks (mrk_1 in source). Null for internal subjects.

  - name: practical_marks
    type: str
    description: Practical/internal marks (mrk_2 in source). Null for internal subjects.

  - name: final_marks
    type: str
    description: Final total marks = theory + practical (mrk_3 in source). Null for internal subjects.

  - name: grade
    type: str
    description: "CBSE grade for the subject (A1, A2, B1, B2, C1, C2, D1, D2, E)."

  - name: subject_result
    type: str
    description: Pass/fail flag at subject level (pf column in source). Usually null.

  - name: total_marks
    type: str
    description: Student's overall total marks across all main subjects (tmrk in source). Repeated on every subject row.

  - name: result
    type: str
    description: "Student's overall result: PASS, ABST (absent), COMP (compartment), etc. Repeated on every subject row."

  - name: school_rank
    type: str
    description: School/region rank for the student. Only populated for 2022 (Rank column in source).

  - name: compartment
    type: str
    description: Compartment flag (comptt in source). Usually null.

  - name: reappear
    type: str
    description: Re-appear/re-attempt flag (rlrw in source). Usually null.

  - name: admission_id
    type: str
    description: Student's JNV admission ID.

  - name: skill_subject
    type: str
    description: Skill subject code and name, if the student took one (e.g. "841-YOGA").

  - name: nse
    type: str
    description: National Scholarship Exam reference, if applicable.

  - name: nchmct
    type: str
    description: NCHMCT (hotel management entrance) reference, if applicable.

  - name: roll_number_10th
    type: str
    description: >
      Student's 10th board roll number. Only populated for 2025.
      Use to join to jnv_fact_board_results_10th on (exam_year - 2, roll_number_10th).
