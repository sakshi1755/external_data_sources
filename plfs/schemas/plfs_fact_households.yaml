table: avantifellows.external_data_sources.plfs_fact_households
description: |
  ── What this table is ───────────────────────────────────────────────────
  Household-level facts from PLFS (see plfs_fact_persons for the survey
  background), all 11 releases unioned (~2.5M rows). One row = one surveyed
  household in one survey visit. Join to plfs_fact_persons on hh_id to attach
  household socio-economics to each person.

  ── Income proxy: why HCE / MPCE instead of income ───────────────────────
  PLFS does NOT ask households their income (income is hard to measure
  reliably in survey conditions). Instead it records HCE — Household Consumer
  Expenditure, i.e. how much the household SPENDS per month — as the standard
  living-standard / income proxy used across Indian household surveys.
    • hce_tot = total monthly household spend (₹).
    • mpce    = Monthly Per-Capita Consumer Expenditure = hce_tot / hh_size,
                i.e. spend per head. This is the comparable figure across
                households of different sizes and is what "low-income /
                first-generation" analyses rank and bucket on.

  Weights work exactly as in plfs_fact_persons: weight_annual = households
  represented; SUM it for population household counts (NULL for CY2021).
clustering: [release_id, st]
columns:
  # ── Release metadata ───────────────────────────────────────────────────
  - { name: release_id,     type: STRING, mode: REQUIRED,
      description: "Release identifier, e.g. 'calendar_2025'." }
  - { name: release_format, type: STRING, mode: REQUIRED,
      description: "'annual' or 'calendar'." }
  - { name: release_year,   type: STRING, mode: REQUIRED,
      description: "Year label, e.g. '2018-19' or 'CY2024'." }
  - { name: catalog_id,     type: STRING, mode: REQUIRED,
      description: "microdata.gov.in catalog ID." }
  - { name: src_file,       type: STRING,
      description: "Source filename stem: 'hhv1' / 'hhrv' / 'chhv1'." }

  # ── Join key + survey design ───────────────────────────────────────────
  - { name: hh_id,          type: STRING, mode: REQUIRED,
      description: "Stable 16-char SHA1 prefix; same derivation as plfs_fact_persons.hh_id. Joins to plfs_fact_persons." }
  - { name: qtr,            type: STRING, description: "Quarter code." }
  - { name: month,          type: STRING, description: "Month code (CY2025)." }
  - { name: visit,          type: STRING, description: "Visit code." }
  - { name: nss_reg,        type: STRING }
  - { name: strm,           type: STRING }
  - { name: sstrm,          type: STRING }
  - { name: ss,             type: STRING }
  - { name: mfsu,           type: STRING }
  - { name: sss,            type: STRING }
  - { name: ssu,            type: STRING }

  # ── Geography ──────────────────────────────────────────────────────────
  - { name: sec,            type: STRING, description: "Sector code. '1'=Rural, '2'=Urban." }
  - { name: sec_label,      type: STRING, description: "Denormalized sector label." }
  - { name: st,             type: STRING, description: "State/UT code." }
  - { name: state_name,     type: STRING, description: "Denormalized state name." }
  - { name: dc,             type: STRING, description: "District code." }

  # ── Household characteristics ──────────────────────────────────────────
  - { name: hh_size,           type: INT64,  description: "Total household members." }
  - { name: hh_type,           type: STRING, description: "Household type code. Interpretation depends on sec — rural and urban use different code lists." }
  - { name: hh_type_label,     type: STRING, description: "Denormalized hh_type label resolved against the correct rural/urban codemap based on sec." }
  - { name: religion,          type: STRING, description: "Religion code." }
  - { name: religion_label,    type: STRING, description: "Denormalized religion label." }
  - { name: social_grp,        type: STRING, description: "Social group code — India's official affirmative-action categories: ST (Scheduled Tribe), SC (Scheduled Caste), OBC (Other Backward Class), or Others. Standard equity-cut dimension." }
  - { name: social_grp_label,  type: STRING, description: "Denormalized social group label (Scheduled Tribe / Scheduled Caste / OBC / Others)." }

  # ── HCE (income proxy) ─────────────────────────────────────────────────
  - { name: hce_tot,  type: INT64, description: "Total household monthly consumer expenditure (₹). The PLFS-standard income proxy." }
  - { name: mpce,     type: FLOAT64,
      description: "Derived: hce_tot / hh_size. Monthly Per Capita Consumer Expenditure. Used as the income proxy in cross-household comparisons." }
  - { name: hce1,     type: INT64, description: "Consumer goods + services HCE component." }
  - { name: hce2,     type: INT64, description: "Home-grown stock imputed HCE component." }
  - { name: hce3,     type: INT64, description: "Wages-in-kind imputed HCE component." }
  - { name: hce4,     type: INT64, description: "Annual clothing/footwear (1/12 averaged into monthly)." }
  - { name: hce5,     type: INT64, description: "Annual durables (1/12 averaged into monthly)." }

  # ── Weight ─────────────────────────────────────────────────────────────
  - { name: nss,           type: INT64 }
  - { name: nsc,           type: INT64 }
  - { name: mult,          type: INT64,   description: "Raw multiplier, 2 implied decimals." }
  - { name: no_qtr,        type: INT64 }
  - { name: weight_annual, type: FLOAT64,
      description: "Calibrated annual weight per household. SUM(weight_annual) yields a weighted-household-count estimate. NULL for CY2021." }
