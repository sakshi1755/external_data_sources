table: avantifellows.external_data_sources.plfs_dim_geo
description: |
  Geography lookup — every (state, district) pair across India.
  ~700 rows.

  State name is already denormalized inline on plfs_fact_persons and
  plfs_fact_households as state_name, so this table is mostly needed when
  resolving district names (district_code is scoped to state, so you
  need the composite key st + dc to look up district_name).

  Joins:
    - (plfs_fact_persons.st, plfs_fact_persons.dc) → (state_code, district_code)
    - (plfs_fact_households.st, plfs_fact_households.dc) → (state_code, district_code)
columns:
  - { name: state_code,    type: STRING, mode: REQUIRED,
      description: "2-digit zero-padded state/UT code, e.g. '09' = Uttar Pradesh." }
  - { name: state_name,    type: STRING, mode: REQUIRED,
      description: "State/UT name as published by MoSPI." }
  - { name: district_code, type: STRING, mode: REQUIRED,
      description: "2-digit district code. Scoped to state — codes are NOT globally unique. Always join on (state_code, district_code)." }
  - { name: district_name, type: STRING, mode: REQUIRED,
      description: "District name as published by MoSPI." }
