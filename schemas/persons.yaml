table: plfs.persons
description: |
  Person-level facts unioned across all 11 PLFS releases (~10.5M rows).
  One row per person-record per visit. Filter by release_id for any
  cross-year analysis; join to plfs.households on hh_id for income proxy
  and household characteristics.

  Labels for the small common enums (sex, sector, marital_status, …) are
  denormalized inline as *_label columns. Hierarchical lookups (NCO / NIC)
  live in plfs.dim_nco / plfs.dim_nic.
clustering: [release_id, st]
columns:
  # ── Release metadata ───────────────────────────────────────────────────
  - { name: release_id,     type: STRING, mode: REQUIRED,
      description: "Release identifier, e.g. 'calendar_2025'. Use as primary filter for cross-year analyses." }
  - { name: release_format, type: STRING, mode: REQUIRED,
      description: "'annual' (Jul–Jun) or 'calendar' (Jan–Dec)." }
  - { name: release_year,   type: STRING, mode: REQUIRED,
      description: "Human-readable year label, e.g. '2018-19' or 'CY2024'." }
  - { name: catalog_id,     type: STRING, mode: REQUIRED,
      description: "microdata.gov.in catalog ID for the source release, e.g. '213'." }
  - { name: src_file,       type: STRING,
      description: "Source filename stem within the release: 'perv1' / 'perrv' / 'cperv1'." }

  # ── Household join key + survey design ─────────────────────────────────
  - { name: hh_id,          type: STRING, mode: REQUIRED,
      description: "Stable 16-char SHA1 prefix of (release_id, qtr, month, visit, sec, st, dc, mfsu, sss, ssu). Joins to plfs.households.hh_id." }
  - { name: srl_no,         type: STRING,
      description: "Person serial number within household." }
  - { name: qtr,             type: STRING, description: "Quarter code (annual / pre-CY2025 releases)." }
  - { name: month,           type: STRING, description: "Month code (CY2025; mutually exclusive with qtr)." }
  - { name: visit,           type: STRING, description: "'V1' (first visit) or 'V2'/'V3'/'V4' (revisits)." }
  - { name: nss_reg,         type: STRING, description: "NSS region code." }
  - { name: strm,            type: STRING, description: "Stratum code (resets per state)." }
  - { name: sstrm,           type: STRING, description: "Sub-stratum code." }
  - { name: ss,              type: STRING, description: "Sub-sample (1 or 2)." }
  - { name: sro,             type: STRING, description: "FOD sub-region code." }
  - { name: mfsu,            type: STRING, description: "First Stage Unit (FSU) serial within stratum." }
  - { name: sss,             type: STRING, description: "Second Stage Stratum number." }
  - { name: ssu,             type: STRING, description: "Sample household number within FSU." }

  # ── Geography ──────────────────────────────────────────────────────────
  - { name: sec,         type: STRING, description: "Sector code. '1'=Rural, '2'=Urban." }
  - { name: sec_label,   type: STRING, description: "Denormalized: 'Rural' or 'Urban'." }
  - { name: st,          type: STRING, description: "State/UT code (2-digit, zero-padded). Joins to plfs.dim_geo.state_code." }
  - { name: state_name,  type: STRING, description: "Denormalized state name." }
  - { name: dc,          type: STRING, description: "District code (2-digit, scoped to state). Use with st to join plfs.dim_geo." }

  # ── Demographics ───────────────────────────────────────────────────────
  - { name: rel,         type: STRING, description: "Relation to household head code. '1' = head of household." }
  - { name: rel_label,   type: STRING, description: "Denormalized relation-to-head label." }
  - { name: sex,         type: STRING, description: "'1'=Male, '2'=Female, '3'=Transgender." }
  - { name: sex_label,   type: STRING, description: "Denormalized sex label." }
  - { name: age,         type: INT64,  description: "Age in completed years." }
  - { name: marst,       type: STRING, description: "Marital status code." }
  - { name: marst_label, type: STRING, description: "Denormalized marital status label." }

  # ── Education ──────────────────────────────────────────────────────────
  - { name: gedu_lvl,    type: STRING, description: "General education level code. '12'=Graduate, '13'=Postgraduate, '10'=Higher Secondary, etc." }
  - { name: gedu_label,  type: STRING, description: "Denormalized general education label." }
  - { name: tedu_lvl,    type: STRING, description: "Technical education code. '03'/'13'=Engineering degree, '04'/'14'=Medical degree." }
  - { name: tedu_label,  type: STRING, description: "Denormalized technical education label." }
  - { name: voc,         type: STRING, description: "Vocational/technical training-received code." }
  - { name: voc_label,   type: STRING, description: "Denormalized vocational training label." }

  # ── Usual Principal Activity Status (Block 5.1) ────────────────────────
  - { name: pas,             type: STRING, description: "Usual principal activity status. '11'/'12' self-employed, '21' unpaid family, '31'=regular salaried, '41'/'42' casual, '51' didn't work but had work, '8x' unemployed, '9x' out of labour force." }
  - { name: pas_label,       type: STRING, description: "Denormalized PAS label." }
  - { name: ind_pas,         type: STRING, description: "Industry (NIC 2008, 5-digit) in principal status. Joins to plfs.dim_nic.code_subclass." }
  - { name: ind_pas_div,     type: STRING, description: "Derived: 2-digit prefix of ind_pas. '62'/'63' = IT services. Joins to plfs.dim_nic.code_division." }
  - { name: ocu_pas,         type: STRING, description: "Occupation (NCO 2015, 3-digit) in principal status. Joins to plfs.dim_nco.code_group." }
  - { name: etyp_pas,        type: STRING, description: "Enterprise type code in principal status." }
  - { name: etyp_pas_label,  type: STRING, description: "Denormalized enterprise type label." }
  - { name: ssec_pas,        type: STRING, description: "Social security benefits code in principal status." }
  - { name: ssec_pas_label,  type: STRING, description: "Denormalized social security label." }
  - { name: job_pas,         type: STRING, description: "Job contract type code in principal status." }
  - { name: job_pas_label,   type: STRING, description: "Denormalized job contract label." }
  - { name: wrkr_pas,        type: STRING, description: "Number-of-workers band in principal status." }
  - { name: wrkr_pas_label,  type: STRING, description: "Denormalized number-of-workers label." }

  # ── Usual Subsidiary Activity Status (Block 5.2) ───────────────────────
  - { name: sas,         type: STRING, description: "Usual subsidiary activity status code (only populated if person reports a secondary activity)." }
  - { name: ind_sas,     type: STRING, description: "Industry (NIC 2008, 5-digit) in subsidiary status." }
  - { name: ocu_sas,     type: STRING, description: "Occupation (NCO 2015, 3-digit) in subsidiary status." }

  # ── Current Weekly Status (Block 6) ────────────────────────────────────
  - { name: aps_cws,     type: STRING, description: "Current Weekly Status activity code (last-7-days reference period)." }
  - { name: aind_cws,    type: STRING, description: "Industry (NIC 2008, 2-digit division) in CWS." }
  - { name: ocu_cws,     type: STRING, description: "Occupation (NCO 2015, 3-digit) in CWS." }

  # ── Earnings ───────────────────────────────────────────────────────────
  - { name: ern_reg,     type: INT64, description: "Monthly earnings (₹) for regular salaried/wage activity. 0 if not applicable." }
  - { name: ern_self,    type: INT64, description: "Monthly earnings (₹) for self-employment. Negative values allowed (losses)." }

  # ── Weight (raw inputs + calibrated output) ────────────────────────────
  - { name: nss,         type: INT64, description: "FSUs surveyed in the cell for this sub-sample." }
  - { name: nsc,         type: INT64, description: "FSUs surveyed in the cell combined across sub-samples." }
  - { name: mult,        type: INT64, description: "Sub-sample-wise multiplier with 2 implied decimals. Kept raw for transparency." }
  - { name: no_qtr,      type: INT64, description: "Count of contributing FSUs across quarters." }
  - name: weight_annual
    type: FLOAT64
    description: >
      Calibrated annual weight per row. Computed at load time via the
      release's weight_rule (see scripts/weights.py).
      SUM(weight_annual) over a filter gives a weighted-population estimate.
      NULL for CY2021 (limited-schema release).
