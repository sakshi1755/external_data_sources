# josaa_fact_cutoffs
#
# Source parquet: gs://avantifellows-external-data/josaa/clean/josaa_fact_cutoffs.parquet
# BQ table:       avantifellows.external_data_sources.josaa_fact_cutoffs

description: |
  JoSAA seat-allotment cutoffs — the opening and closing rank for every
  (institute, program, quota, category, gender) seat bucket, in every
  counselling round, every year (2016 → latest). ~523k rows.

  WHAT JoSAA IS. JoSAA (Joint Seat Allocation Authority) runs the single
  centralized admission counselling for India's centrally-funded engineering
  institutes: IITs, NITs, IIITs, and GFTIs (Government Funded Technical
  Institutes). Candidates qualify via JEE (Main and/or Advanced), rank their
  program preferences, and JoSAA allots seats over several sequential rounds.
  After each round it publishes, for every seat bucket, the rank of the first
  candidate allotted (OPENING rank) and the last candidate allotted (CLOSING
  rank). The closing rank is the cutoff.

  HOW ROUNDS WORK. A cycle has ~5–7 rounds (count varies by year). Cutoffs
  drift round to round as candidates upgrade or withdraw. Each (year, round)
  is its own complete snapshot; this table is the UNION of all rounds across
  all years. The "final closing rank" people usually quote is the closing rank
  in the LAST round of that year — get it with a per-(institute, program,
  quota, seat_type, gender, year) argmax on `round`. Never sum across rounds.

  TWO RANK SPACES — NEVER MIX. IITs admit on JEE Advanced rank; NITs/IIITs/
  GFTIs admit on JEE Main rank. A closing rank of 5,000 at an IIT (Advanced)
  is a far stronger student than 5,000 at an NIT (Main). The institute
  determines which rank space applies.

  PREPARATORY RANKS. Ranks flagged *_is_preparatory come from JoSAA's
  separate preparatory merit list (for certain SC/ST/PwD candidates), not the
  main Common Rank List. Their numeric scale is not comparable to a main-list
  rank. Filter `WHERE NOT closing_is_preparatory` for standard analysis.

  RAW NEUTRAL FACT. This table carries only what JoSAA publishes. No Avanti
  enrichment (salary tiers, college_type, canonical college_id, NIRF salary)
  is added here. Join to College DB / AISHE data downstream for those.

  GOTCHAS (read before writing SQL):
  1. gender IS NULL for 2016 and 2017 (~47k rows). JoSAA did not publish
     gender-split cutoffs before 2018 — all seats were effectively
     Gender-Neutral but the portal omits the column for those years. Filter
     `WHERE year >= 2018` for gender-split analysis, or treat NULL as
     Gender-Neutral for cross-year queries.
  2. AP quota (Andhra Pradesh legacy) appears only in 2016–2019 at NIT
     Warangal — a pre-bifurcation special quota that was phased out. ~971
     rows. Don't drop it; just be aware when aggregating by quota.
  3. institute names drift across years (same college, different spelling).
     Use LIKE / REGEXP, not equality, for cross-year institute matching.
  4. To get the "final cutoff" for a year: filter to the MAX(round) per
     (institute, academic_program_name, quota, seat_type, gender, year).
     Do NOT just filter round = 5 — round counts vary (5 to 7) by year.

rows: ~460000
grain: (institute, academic_program_name, quota, seat_type, gender, year, round)

columns:
  - name: institute
    type: STRING
    mode: REQUIRED
    description: |
      Institute name exactly as JoSAA publishes it (e.g. "Indian Institute of
      Technology Bombay", "National Institute of Technology, Tiruchirappalli").
      Spelling and punctuation vary across years — use multi-keyword LIKE /
      REGEXP matching, not full-name equality.

  - name: academic_program_name
    type: STRING
    mode: REQUIRED
    description: |
      Full program description as published, including degree and duration,
      e.g. "Computer Science and Engineering (4 Years, Bachelor of Technology)".
      Dual/integrated degrees carry their own text.

  - name: quota
    type: STRING
    mode: REQUIRED
    description: |
      Seat quota / domicile pool. AI = All India (IITs and the national pool
      for NITs/IIITs/GFTIs); HS = Home State; OS = Other State (HS/OS apply
      to state-located NITs); GO = Goa; JK = Jammu & Kashmir; LA = Ladakh;
      AP = Andhra Pradesh legacy quota (NIT Warangal only, 2016–2019, phased
      out after state bifurcation). See codemaps/quota.csv for the full list.

  - name: seat_type
    type: STRING
    mode: REQUIRED
    description: |
      Reservation category for the seat: OPEN, EWS, OBC-NCL, SC, ST, and the
      PwD variants OPEN (PwD), EWS (PwD), OBC-NCL (PwD), SC (PwD), ST (PwD).
      See codemaps/seat_type.csv.

  - name: gender
    type: STRING
    mode: NULLABLE
    description: |
      Gender pool: "Gender-Neutral" (open to all) or "Female-only (including
      Supernumerary)" (female supernumerary seats added to improve gender
      ratio). NULL for 2016–2017 — JoSAA did not publish gender-split data
      those years (see GOTCHA #1 above). No male-only seats exist in JoSAA.

  - name: opening_rank
    type: INTEGER
    mode: NULLABLE
    description: |
      Rank of the first (best-ranked) candidate allotted this seat bucket in
      this round. Integer part of JoSAA's published value. In the institute's
      rank space (JEE Advanced for IITs, JEE Main for NITs/IIITs/GFTIs).
      NULL if the bucket had no published rank.

  - name: closing_rank
    type: INTEGER
    mode: NULLABLE
    description: |
      Rank of the last (worst-ranked) candidate allotted this seat bucket in
      this round — i.e. the cutoff. The headline number for "could a rank X
      get in". Integer part only; see closing_is_preparatory for scale caveat.

  - name: opening_is_preparatory
    type: BOOLEAN
    mode: REQUIRED
    description: |
      TRUE if opening_rank came from the preparatory merit list (JoSAA marks
      these with a trailing 'P', e.g. '50P'). Prep ranks are not comparable
      to main-list ranks — exclude from standard cutoff analysis.

  - name: closing_is_preparatory
    type: BOOLEAN
    mode: REQUIRED
    description: |
      TRUE if closing_rank came from the preparatory merit list. Filter
      `WHERE NOT closing_is_preparatory` for standard cutoff queries.

  - name: year
    type: INTEGER
    mode: REQUIRED
    description: JoSAA counselling year (2016 → latest). One cycle per calendar year.

  - name: round
    type: INTEGER
    mode: REQUIRED
    description: |
      Counselling round number within the year (1 = first allotment). The
      max round per year is the final allotment; round count varies (~5–7).
      Each (year, round) is a full snapshot — do not sum or average across
      rounds.
