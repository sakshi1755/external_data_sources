description: >
  UBSE (Uttarakhand Board of School Education) Grade 10 (High School) board
  exam results, 2026+. One row per student per subject — wide subject slots
  from the source file are unpivoted to long format.

grain: (exam_year, roll_no, subject_slot)

source_files:
  2026: "G10th _ UBSE Board data 2026.xlsx  (sheet: HS_NET)"

columns:
  - name: exam_year
    type: str
    description: Year of the board exam (e.g. "2026").

  - name: district_code
    type: str
    description: UBSE district code (DISTT). 13 districts in Uttarakhand.

  - name: school_code
    type: str
    description: School code assigned by UBSE (SCHOOL).

  - name: roll_no
    type: str
    description: Student's board exam roll number. Part of the grain.

  - name: registration_no
    type: str
    description: Student's registration number (REGCD).

  - name: student_name
    type: str
    description: Student full name (CNAME).

  - name: father_name
    type: str
    description: Father's name (FNAME).

  - name: mother_name
    type: str
    description: Mother's name (MNAME).

  - name: date_of_birth
    type: str
    description: Date of birth as received from source (e.g. "13-10-2010").

  - name: gender
    type: str
    description: "Normalised from SEX code: Male, Female, or Others."

  - name: caste
    type: str
    description: "Normalised from CASTE code: SC, ST, OBC, or General."

  - name: school_type
    type: str
    description: >
      School type code (SCHTYPE): A = Government, B = Government Aided,
      C = Private (Unaided), D = Central Government (KV/NV/etc.).

  - name: subject_slot
    type: int
    description: >
      Slot number (1–6) from the source wide format. Slot 1 is always HINDI.
      Repeated rows for the same student differ only in this and the
      subject_* columns.

  - name: subject_name
    type: str
    description: Subject name as given in the source (e.g. MATHEMATICS, SCIENCE, PAINTING).

  - name: theory_marks
    type: str
    description: Theory/written marks for the subject (SUBnTHMKS).

  - name: practical_marks
    type: str
    description: Practical marks for the subject (SUBnPRAMKS). Null for theory-only subjects.

  - name: internal_marks
    type: str
    description: Internal/sessional marks for the subject (SUBnINTMKS).

  - name: subject_total
    type: str
    description: Total marks for the subject = theory + practical + internal (SUBnTOT).

  - name: subject_result
    type: str
    description: Subject-level pass/fail flag (SUBnRES). Usually null; populated for compartment cases.

  - name: subject_grade
    type: str
    description: "Grade for the subject (SUBnGRADE): A1, A2, B1, B2, C1, C2, D1, D2, E."

  - name: total_marks_obtained
    type: str
    description: Student's overall total marks across all subjects (TOTMKSOBT). Repeated on every subject row.

  - name: total_max_marks
    type: str
    description: Maximum possible total marks (TOTMAXMKS). Typically 0500. Repeated on every subject row.

  - name: result
    type: str
    description: >
      Student's overall result, normalised: Pass, Fail, Absent,
      Pass (Compartment), Pass (ADL), Withheld, Cancelled, Incomplete.
      Repeated on every subject row.

  - name: division
    type: str
    description: >
      Division awarded: FIRST HONS, FIRST DIVISION, SECOND DIVISION,
      THIRD DIVISION. Null for failed/absent students.
      Repeated on every subject row.

  - name: grace_marks
    type: str
    description: Grace marks applied, if any (GRACE). Non-null for ~15k students.
